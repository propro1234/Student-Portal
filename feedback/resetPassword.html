<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password...</title>
    <link rel="stylesheet" type="text/css" href="bootstrap.min.css">
    <style>
        body
        {
            background: linear-gradient(rgba(0,0,0,0.6) , rgba(0,0,0,0.6)),url(back.jpg);
            background-size: cover;
        }
    </style>
</head>
<body>
    <div class="container vh-100">
        <div class="row justify-content-center h-100">
            <div class="card w-50 my-auto shadow border-primary mb-3">  
                <div class="card-header text-center">
                    <img class="card-img-top w-25" src="img/avatar.svg" alt="">
                    <h2 style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;"><b>Reset Password</b></h2>
                </div>
                <div class="card-body">
                    <form action="resetPassword.jsp" method="POST">
                        <div class="form-group">
                            <label for="uname">Username</label>
                            <input type="text" class="form-control" id="uname" name="uname" placeholder="Username(Registered)" required>

                            <label for="newpass">New Password</label>
                            <input type="password" class="form-control" id="newpass" name="newpass" placeholder="Password" required>

                            <label for="connewpass">Confirm Password</label>
                            <input type="password" class="form-control" id="connewpass" name="connewpass" placeholder="Password" required>
                        </div>
                        <input type="submit" class="btn btn-primary w-30" style="float: right;" value="SET">
                    </form>
                </div>
                <div class="card-footer text-right">
                    <small>&copy; SciTech 2020</small>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
