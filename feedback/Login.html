<!DOCTYPE html>
<html>

<head>
    <title>Login Here...</title>
    <link rel="stylesheet" type="text/css" href="css/Login.css">
    <link href="https://fonts.googleapis.com/css?family=Poppins:600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a81368914c.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <img class="wave" src="img/wave.png">
    <div class="container">
        <div class="img">
            <img src="img/bg.svg">
        </div>
        <div class="login-content">
            <form action="Login.jsp" method="POST">
                <img src="img/avatar.svg">
                <h2 class="title">Welcome</h2>
                <div class="input-div one">
                    <div class="i">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="div">
                        <h5>Username</h5>
                        <input type="text" class="input" name="uname" required>
                    </div>
                </div>
                <div class="input-div pass">
                    <div class="i">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="div">
                        <h5>Password</h5>
                        <input type="password" class="input" name="pass" required>
                    </div>
                </div>
                <div class="input-div pass">
                    <div class="i">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="div">
                        <h5>Confirmed Password</h5>
                        <input type="password" class="input" name="conpass" required>
                    </div>
                </div>
                <a href="Homepage.html" class="home"><i class="fas fa-home"></i>Home</a>
                <a href="send-verifyOTP.html">Forgot Password?</a>
                <input type="submit" class="btn" value="Login"><input type="reset" value="Cancel">
                Have not account yet! Create an account<a href="Register.html" class="sign-up" style="text-align: center; border: 2px solid #000;
                border-radius: 25px; margin-left: 40px;margin-right: 40px; margin-top: 10px; padding: 10px 0;" >Sign up</a>
            </form>
        </div>
    </div>
    <script type="text/javascript" src="js/main.js"></script>
</body>

</html>
