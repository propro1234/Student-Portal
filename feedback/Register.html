<!DOCTYPE html>
<html>

<head>
    <title>Register Here...</title>
    <link rel="stylesheet" type="text/css" href="css/Register.css">
    <link href="https://fonts.googleapis.com/css?family=Poppins:600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a81368914c.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <img class="wave" src="img/wave.png">
    <div class="container">
        <div class="img">
            <img src="img/bg.svg">
        </div>
        <div class="login-content">
            <form action="Register.jsp" method="">
                <img src="img/avatar.svg">
                <h2 class="title">Welcome</h2>
                <div class="input-div one">
                    <div class="i">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="div">
                        <h5>First Name</h5>
                        <input type="text" class="input" name="fname" required>
                    </div>
                </div>
                <div class="input-div one">
                    <div class="i">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="div">
                        <h5>Last Name</h5>
                        <input type="text" class="input" name="lname" required>
                    </div>
                </div>
                <div class="">
                    <div class="i">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="div">
                        <h5>Gender</h5>
                        <label for="male"><input type="radio" name="gender" id="male" style="margin-left: 5px;margin-top: 10px;" required>Male</label>
                        <label for="female"><input type="radio" name="gender" id="female" style="margin-left: 40px;margin-top: 10px;" required>Female</label>
                    </div>
                </div>
                <div class="input-div one">
                    <div class="i">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="div">
                        <h5>Email</h5>
                        <input type="email" class="input" name="email" required>
                    </div>
                </div>
                <div class="input-div one">
                    <div class="i">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="div">
                        <h5>Username</h5>
                        <input type="text" class="input" name="uname" required>
                    </div>
                </div>
                <div class="input-div pass">
                    <div class="i">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="div">
                        <h5>Password</h5>
                        <input type="password" class="input" name="pass" required>
                    </div>
                </div>
                <div class="input-div pass">
                    <div class="i">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="div">
                        <h5>Confirm Password</h5>
                        <input type="password" class="input" name="conpass" required>
                    </div>
                </div>
                <a href="Homepage.html" class="home"><i class="fas fa-home"></i>Home</a>
                <a href="#">Forgot Password?</a>
                <input type="submit" class="btn" value="Register"><input type="reset" value="Cancel">
                Have an account. Please Sign-in<a href="Login.html" class="sign-up" style="text-align: center; border: 2px solid #000;
                border-radius: 25px; margin-left: 40px;margin-right: 40px; margin-top: 10px; padding: 10px 0;" >Sign in</a>
            </form>
        </div>
    </div>
    <script type="text/javascript" src="js/main.js"></script>
</body>

</html>
