<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body 
        {
            font-family: Arial, Helvetica, sans-serif;
        }

        * 
        {
            box-sizing: border-box;
        }

        input[type=text],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 6px;
            margin-bottom: 16px;
            resize: vertical;
        }

        input[type=email]
        {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 6px;
            margin-bottom: 16px;
            resize: vertical;
        }

        input[type=submit] {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-image: linear-gradient(to right, #ff5722 , #5f1782) !important;
        }

        input[type=reset]
        {
            /* background-color: #4CAF50; */
            background-image: linear-gradient(to right, #ff5722 , #5f1782) !important;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type=reset]:hover
        {
            background-image: linear-gradient(to right, #bc401b , #832aaf) !important;
        }

        input[type=submit]:hover {
            /* background-color: #45a049; */
            background-image: linear-gradient(to right, #c84c26 , #962eca) !important;
        }

        .container 
        {
            border-radius: 5px;
            background-color: #f2f2f2;
            padding: 20px;
        }
    </style>
</head>

<body>

    <h3 style="text-align: center;"><u>Contact us</u></h3>
    <p style="text-align: center !important;font-size: 15px;"><b>Send your opinion to us</b></p>

    <div class="container">
        <form action="contact.jsp" method="POST">
            <label for="uname">Username(Registered)</label>
            <input type="text" id="uname" name="uname" placeholder="Username" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Email" required>

            <label for="sem">Semester</label>
            <select id="sem" name="sem">
                <option value="1st">1st Sem</option>
                <option value="2nd">2nd Sem</option>
                <option value="3rd">3rd Sem</option>
                <option value="4th">4th Sem</option>
                <option value="5th">5th Sem</option>
                <option value="6th">6th Sem</option>
            </select>

            <label for="comm">Comment</label>
            <textarea id="comm" name="comm" placeholder="Your Comment" style="height:200px" required></textarea>

            <input type="submit" value="Post Comment">&nbsp;&nbsp;&nbsp;&nbsp;<input type="reset" value="Cancel">
        </form>
    </div>

</body>

</html>
