<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminLogin Page....</title>
    <link rel="stylesheet" type="text/css" href="bootstrap.min.css">
    <style>
        body
        {
            background: linear-gradient(rgba(0,0,0,0.6) , rgba(0,0,0,0.6)),url(img103.png);
            -webkit-background-size: cover;
            background-size: cover;
            background-position: center center;
        }
    </style>
</head>
<body>
    <div class="container vh-100">
        <div class="row justify-content-center h-100">
            <div class="card w-25 my-auto shadow border-primary mb-3">  
                <div class="card-header text-center">
                    <img class="card-img-top w-50" src="img/avatar.svg" alt="">
                    <h2 style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;"><b>Admin login</b></h2>
                </div>
                <div class="card-body">
                    <form action="AdminLogin.jsp" method="POST">
                        <div class="form-group">
                            <label for="pass">Password</label>
                            <input type="text" class="form-control" id="pass" name="pass" placeholder="Password" />
                        </div>
                        <input type="submit" class="btn btn-primary w-100" value="Go">
                    </form>
                </div>
                <div class="card-footer text-right">
                    <small>&copy; SciTech 2020</small>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
